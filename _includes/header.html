<meta charset="utf-8"/>
<header>
  <div class="col-lg-12">
    <div class="row">
      
      <nav class="navbar navbar-expand-lg fixed-top navbar-dark " id="topNav">
        <!-- <a class="navbar-brand" href="#">{% t name %}</a> -->
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="/">{% t name %}</a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            {% for i in site.urls %}
	    {% if i.text != "Blog" or site.lang != "en" %}
            <li class="nav-item">
              <a class="nav-link" href="{{ site.url}}{{site.baseurl}}{{ i.url }}">{{ i.text }}</a>
            </li>
	    {% endif %}
            {% endfor %}
          </ul>	  
        </div>

        <ul class="nav justify-content-end">
          <li class="nav-item">
            {% if site.lang == "en" %}
	    <a class="nav-link" style="color:rgba(255, 255, 255, 0.5) !important;" 
	       href="{{ site.baseurl_root }}{{ page.url }}" > ja </a>
	    {% elsif site.lang == "ja" %}
	    <a class="nav-link" style="color:rgba(255, 255, 255, 0.5) !important;" 
	       href="{{ site.baseurl_root }}/en{{ page.url }}" > en </a>
	    {% endif %}
          </li>
          <li class="nav-item">
            <input class="nav-link switch" id="theme-toggle" onclick="modeSwitcher() "type="checkbox" name="checkbox" >
          </li>
        </ul>
      </nav>
      
    </div>    
  </div>
</header>
